services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ledgerly_migrator
      POSTGRES_PASSWORD: ledgerly
      POSTGRES_DB: ledgerly
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/prisma/init-runtime-role.sql:/docker-entrypoint-initdb.d/10-runtime-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerly_migrator -d ledgerly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
